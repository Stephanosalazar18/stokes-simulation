<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teorema de Stokes — Visualizador</title>
  <style>
    :root {
      --bg-panel: rgba(20, 20, 30, 0.85);
      --text: #e0e0e0;
      --accent: #4caf50;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      color: var(--text);
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    #app { display: block; width: 100vw; height: 100vh; }
    #mode-switcher {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    #mode-switcher button {
      background: var(--bg-panel);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    #mode-switcher button:hover { background: rgba(60,60,80,0.9); }
    #mode-switcher button.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    #field-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 250px;
      background: var(--bg-panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 14px 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 13px;
    }
    #field-panel label {
      color: var(--text);
      font-weight: 500;
    }
    #field-select {
      background: rgba(40,40,55,0.9);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    #field-select:focus { outline: 1px solid var(--accent); }
    #density-slider {
      width: 100%;
      accent-color: var(--accent);
    }
    #field-status {
      color: rgba(200,200,220,0.8);
      font-size: 12px;
      font-style: italic;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <nav id="mode-switcher" role="radiogroup" aria-label="Selector de modo">
    <button role="radio" aria-checked="true" data-mode="1" class="active">1 Flujo 2D</button>
    <button role="radio" aria-checked="false" data-mode="2">2 Gradientes 3D</button>
    <button role="radio" aria-checked="false" data-mode="3">3 Deformación</button>
  </nav>
  <div id="field-panel">
    <label for="field-select">Campo vectorial</label>
    <select id="field-select"></select>
    <label for="density-slider">Densidad de partículas</label>
    <input type="range" id="density-slider" min="1" max="10" value="5" />
    <span id="field-status"></span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
